<svg width="1200" height="1070" viewBox="0 0 1200 1070" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gentle wobbly filter for paths/shapes only -->
    <filter id="gentle-rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Warm light canvas background -->
  <rect width="1200" height="1070" rx="16" fill="#FEF9F0" />
  
  <!-- Light grid lines -->
  <g opacity="0.15" stroke="#E5E0D8" stroke-width="1">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400 M 0,450 L 1200,450 M 0,500 L 1200,500 M 0,550 L 1200,550 M 0,600 L 1200,600 M 0,650 L 1200,650 M 0,700 L 1200,700 M 0,750 L 1200,750 M 0,800 L 1200,800 M 0,850 L 1200,850 M 0,900 L 1200,900 M 0,950 L 1200,950 M 0,1000 L 1200,1000 M 0,1050 L 1200,1050" />
    <path d="M 100,0 L 100,1070 M 200,0 L 200,1070 M 300,0 L 300,1070 M 400,0 L 400,1070 M 500,0 L 500,1070 M 600,0 L 600,1070 M 700,0 L 700,1070 M 800,0 L 800,1070 M 900,0 L 900,1070 M 1000,0 L 1000,1070 M 1100,0 L 1100,1070" />
  </g>

  <!-- ── CARD 1: Friction (Top Left) ── -->
  <g transform="translate(40, 40)">
    <!-- Wobbly Box -->
    <rect width="630" height="480" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="24" y="24" width="135" height="42" rx="10" fill="none" stroke="#E05A47" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="91.5" y="53" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#E05A47" text-anchor="middle">Fricti0n</text>
    
    <!-- Title -->
    <text x="24" y="98" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="22" font-weight="bold" fill="#E05A47">The Market &quot;Pull&quot;</text>
    
    <!-- Underline -->
    <line x1="24" y1="114" x2="606" y2="114" stroke="#E05A47" stroke-dasharray="0" stroke-width="1.8" filter="url(#gentle-rough)" />
    
    <!-- Content Text -->
    <text x="24" y="150" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">What it represents:</tspan> Real, active engineering pain points</text>
    
    <text x="24" y="185" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">Focus:</tspan> Sourced from raw community (GitHub issues,</text>
    <text x="24" y="210" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">Reddit threads, Hacker News comments)</text>
    <text x="24" y="235" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">Maybe a venting about a missing driver, a library</text>
    <text x="24" y="260" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">compatibility bug, or an undocumented limitation.</text>
    
    <text x="24" y="295" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">Why it is included:</tspan> It provides validation.</text>
    <text x="24" y="320" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">It proves that there is a genuine problem causing real</text>
    <text x="24" y="345" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">developers headache.</text>
    <text x="24" y="370" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">Ensuring you don't build something nobody actually</text>
    <text x="24" y="395" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">struggles with.</text>
  </g>

  <!-- ── CARD 2: Bridge (Top Right) ── -->
  <g transform="translate(700, 40)">
    <!-- Wobbly Box -->
    <rect width="460" height="480" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="24" y="24" width="125" height="42" rx="10" fill="none" stroke="#14B8A6" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="86.5" y="53" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#14B8A6" text-anchor="middle">Bridge</text>
    
    <!-- Title -->
    <text x="24" y="98" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="22" font-weight="bold" fill="#14B8A6">The Technical Enabler</text>
    
    <!-- Underline -->
    <line x1="24" y1="114" x2="436" y2="114" stroke="#14B8A6" stroke-dasharray="0" stroke-width="1.8" filter="url(#gentle-rough)" />
    
    <!-- Content Text -->
    <text x="24" y="150" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">What it represents:</tspan> Open-</text>
    <text x="24" y="175" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">source repositories,</text>
    <text x="24" y="200" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">libraries, and tools.</text>
    
    <text x="24" y="240" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">Focus:</tspan> Obscure or emerging</text>
    <text x="24" y="265" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">codebases (a compiler that</text>
    <text x="24" y="290" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">converts Python definitions</text>
    <text x="24" y="315" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">into hardware layouts, or a</text>
    <text x="24" y="340" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">library connecting micro-</text>
    <text x="24" y="365" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">controllers logic to a DB).</text>
  </g>

  <!-- ── CARD 3: Deep Dive (Bottom Left) ── -->
  <g transform="translate(40, 550)">
    <!-- Wobbly Box -->
    <rect width="400" height="480" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="24" y="24" width="145" height="42" rx="10" fill="none" stroke="#D97706" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="96.5" y="53" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#D97706" text-anchor="middle">Deep Dive</text>
    
    <!-- Title -->
    <text x="24" y="98" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="22" font-weight="bold" fill="#D97706">The Academic Foundation</text>
    
    <!-- Underline -->
    <line x1="24" y1="114" x2="376" y2="114" stroke="#D97706" stroke-dasharray="0" stroke-width="1.8" filter="url(#gentle-rough)" />
    
    <!-- Content Text -->
    <text x="24" y="150" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">What it represents:</tspan> One highly</text>
    <text x="24" y="175" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">technical, comprehensive</text>
    <text x="24" y="200" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">write-up, whitepaper, or</text>
    <text x="24" y="225" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">academic article worth reading</text>
    <text x="24" y="250" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">in full.</text>
    
    <text x="24" y="290" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">Focus:</tspan> Thorough, low-noise</text>
    <text x="24" y="315" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">engineering documents (a guide</text>
    <text x="24" y="340" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">on high-frequency PCB trace</text>
    <text x="24" y="365" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">design, or an analysis of</text>
    <text x="24" y="390" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">memory allocation structures).</text>
  </g>

  <!-- ── CARD 4: Opportunity (Bottom Right) ── -->
  <g transform="translate(470, 550)">
    <!-- Wobbly Box -->
    <rect width="690" height="480" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="24" y="24" width="165" height="42" rx="10" fill="none" stroke="#A855F7" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="106.5" y="53" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#A855F7" text-anchor="middle">0pportunity</text>
    
    <!-- Title -->
    <text x="24" y="98" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="22" font-weight="bold" fill="#A855F7">The Actionable Product</text>
    
    <!-- Underline -->
    <line x1="24" y1="114" x2="666" y2="114" stroke="#A855F7" stroke-dasharray="0" stroke-width="1.8" filter="url(#gentle-rough)" />
    
    <!-- Content Text -->
    <text x="24" y="150" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">What it represents:</tspan> A specific, scoped project gap</text>
    <text x="24" y="175" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">with a suggested implementation path.</text>
    
    <text x="24" y="215" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">Focus:</tspan> Synthesized ideas that map out the estimated</text>
    <text x="24" y="240" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">effort (&quot;2 weeks&quot;), the proposed technical approach,</text>
    <text x="24" y="265" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">the evidence of the gap, and any existing prior art.</text>
    
    <text x="24" y="305" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold">Why it is included:</tspan> It is the output. Instead of a</text>
    <text x="24" y="330" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">generic &quot;someone should build a better database,&quot; it</text>
    <text x="24" y="355" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">describes a targeted, high-signal project blueprint</text>
    <text x="24" y="380" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">that you can start building immediately.</text>
  </g>
</svg>
