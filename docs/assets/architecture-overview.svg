<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gentle wobbly filter for paths/shapes only -->
    <filter id="gentle-rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <pattern id="dot-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#E5E0D8" />
    </pattern>
  </defs>

  <!-- Warm light canvas background -->
  <rect width="1200" height="700" rx="16" fill="#FEF9F0" />
  <rect width="1200" height="700" fill="url(#dot-pattern)" />
  
  <!-- Section Title -->
  <text x="60" y="60" font-family="Consolas, 'Fira Code', monospace" font-size="28" font-weight="bold" fill="#18181C">System Architecture 0verview (Tentative)</text>
  <text x="60" y="85" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="14" fill="#6B6B76">STATISTICS-BASED SHARED GLOBAL CACHE PIPELINE FLOW</text>

  <!-- ── 1. FRONTEND SPA (Browser) ── -->
  <g transform="translate(60, 150)">
    <!-- Shadow -->
    <rect x="8" y="8" width="320" height="350" rx="14" fill="#FCEAE6" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="320" height="350" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="25" y="25" width="165" height="40" rx="8" fill="rgba(224, 90, 71, 0.05)" stroke="#E05A47" stroke-width="2" filter="url(#gentle-rough)" />
    <text x="107.5" y="52" font-family="Consolas, 'Fira Code', monospace" font-size="18" font-weight="bold" fill="#E05A47" text-anchor="middle">Fr0ntend SPA</text>
    
    <text x="25" y="100" font-family="Consolas, 'Fira Code', monospace" font-size="22" font-weight="bold" fill="#E05A47">Native Client</text>
    <line x1="25" y1="115" x2="295" y2="115" stroke="#E05A47" stroke-width="1.5" filter="url(#gentle-rough)" />
    
    <!-- Components inside -->
    <rect x="25" y="140" width="270" height="50" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="160" y="170" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="16" fill="#4B4B54" text-anchor="middle">State machine (app.js)</text>
    
    <rect x="25" y="205" width="270" height="50" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="160" y="235" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="16" fill="#4B4B54" text-anchor="middle">Hash-based router</text>
    
    <rect x="25" y="270" width="270" height="50" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="160" y="300" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="16" fill="#4B4B54" text-anchor="middle">Swipe deck &amp; Kanban</text>
  </g>

  <!-- ── 2. BACKEND API SERVER (FastAPI) ── -->
  <g transform="translate(440, 100)">
    <!-- Shadow -->
    <rect x="8" y="8" width="320" height="500" rx="14" fill="#E6F7F5" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="320" height="500" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="25" y="25" width="165" height="40" rx="8" fill="rgba(20, 184, 166, 0.05)" stroke="#14B8A6" stroke-width="2" filter="url(#gentle-rough)" />
    <text x="107.5" y="52" font-family="Consolas, 'Fira Code', monospace" font-size="18" font-weight="bold" fill="#14B8A6" text-anchor="middle">Backend API</text>
    
    <text x="25" y="100" font-family="Consolas, 'Fira Code', monospace" font-size="22" font-weight="bold" fill="#14B8A6">FastAPI Server</text>
    <line x1="25" y1="115" x2="295" y2="115" stroke="#14B8A6" stroke-width="1.5" filter="url(#gentle-rough)" />
    
    <!-- Components -->
    <rect x="25" y="140" width="270" height="60" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="160" y="165" font-family="Consolas, 'Fira Code', monospace" font-size="14" fill="#E05A47" text-anchor="middle">Depends(get_db)</text>
    <text x="160" y="185" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">SQLite session provider</text>

    <rect x="25" y="215" width="270" height="60" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="160" y="240" font-family="Consolas, 'Fira Code', monospace" font-size="14" fill="#14B8A6" text-anchor="middle">Depends(get_current_user)</text>
    <text x="160" y="260" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">JWT Security interceptor</text>

    <!-- Cache Manager Logic -->
    <rect x="25" y="290" width="270" height="80" rx="6" fill="#FEF9F0" stroke="#E05A47" stroke-dasharray="6 4" stroke-width="2" filter="url(#gentle-rough)" />
    <text x="160" y="325" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#18181C" text-anchor="middle">Cache Manager Logic</text>
    <text x="160" y="350" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#4B4B54" text-anchor="middle">Check local SQLite cache first</text>

    <rect x="25" y="385" width="270" height="60" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="160" y="410" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" font-weight="bold" fill="#18181C" text-anchor="middle">SQLAlchemy DB engine</text>
    <text x="160" y="430" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">SQLite file: gripc0re.db</text>
  </g>

  <!-- ── 3. EXTERNAL PIPELINE (Gemini & Scraper) ── -->
  <g transform="translate(820, 150)">
    <!-- Shadow -->
    <rect x="8" y="8" width="320" height="350" rx="14" fill="#F5ECFE" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="320" height="350" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="25" y="25" width="165" height="40" rx="8" fill="rgba(168, 85, 247, 0.05)" stroke="#A855F7" stroke-width="2" filter="url(#gentle-rough)" />
    <text x="107.5" y="52" font-family="Consolas, 'Fira Code', monospace" font-size="18" font-weight="bold" fill="#A855F7" text-anchor="middle">Pipeline</text>
    
    <text x="25" y="100" font-family="Consolas, 'Fira Code', monospace" font-size="22" font-weight="bold" fill="#A855F7">AI &amp; Scraping</text>
    <line x1="25" y1="115" x2="295" y2="115" stroke="#A855F7" stroke-width="1.5" filter="url(#gentle-rough)" />
    
    <rect x="25" y="140" width="270" height="70" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="160" y="165" font-family="Consolas, 'Fira Code', monospace" font-size="18" font-weight="bold" fill="#A855F7" text-anchor="middle">G00gle Gemini</text>
    <text x="160" y="185" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">SDK JSON prompt</text>
    <text x="160" y="200" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">generation</text>
    
    <rect x="25" y="235" width="270" height="70" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="160" y="260" font-family="Consolas, 'Fira Code', monospace" font-size="18" font-weight="bold" fill="#D97706" text-anchor="middle">Crawler Pr0xy</text>
    <text x="160" y="280" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">HTTPX &amp; BS4</text>
    <text x="160" y="295" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">image crawler</text>
  </g>

  <!-- ── FLOW ARROWS & LABELS ── -->
  <!-- Frontend -> Backend -->
  <path d="M 390 325 L 430 325" stroke="#18181C" stroke-width="2" stroke-dasharray="4 4" filter="url(#gentle-rough)" />
  <polygon points="435,325 425,320 425,330" fill="#18181C" filter="url(#gentle-rough)"/>
  <text x="410" y="315" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">JSON API</text>

  <!-- Backend -> Pipeline -->
  <path d="M 770 280 L 810 280" stroke="#E05A47" stroke-width="2" filter="url(#gentle-rough)" />
  <polygon points="815,280 805,275 805,285" fill="#E05A47" filter="url(#gentle-rough)"/>
  <text x="790" y="270" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#E05A47" text-anchor="middle">miss</text>

  <!-- Return Flow Pipeline -> Backend -->
  <path d="M 810 360 L 770 360" stroke="#14B8A6" stroke-width="2" filter="url(#gentle-rough)" />
  <polygon points="765,360 775,355 775,365" fill="#14B8A6" filter="url(#gentle-rough)"/>
  <text x="790" y="380" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#14B8A6" text-anchor="middle">cache</text>

</svg>
