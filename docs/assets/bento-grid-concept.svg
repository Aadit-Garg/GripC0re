<svg width="1200" height="1070" viewBox="0 0 1200 1070" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gentle wobbly filter for paths/shapes only -->
    <filter id="gentle-rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Warm light canvas background -->
  <rect width="1200" height="1070" rx="16" fill="#FEF9F0" />
  
  <!-- Light grid lines -->
  <g opacity="0.15" stroke="#E5E0D8" stroke-width="1">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400 M 0,450 L 1200,450 M 0,500 L 1200,500 M 0,550 L 1200,550 M 0,600 L 1200,600 M 0,650 L 1200,650 M 0,700 L 1200,700 M 0,750 L 1200,750 M 0,800 L 1200,800 M 0,850 L 1200,850 M 0,900 L 1200,900 M 0,950 L 1200,950 M 0,1000 L 1200,1000 M 0,1050 L 1200,1050" />
    <path d="M 100,0 L 100,1070 M 200,0 L 200,1070 M 300,0 L 300,1070 M 400,0 L 400,1070 M 500,0 L 500,1070 M 600,0 L 600,1070 M 700,0 L 700,1070 M 800,0 L 800,1070 M 900,0 L 900,1070 M 1000,0 L 1000,1070 M 1100,0 L 1100,1070" />
  </g>

  <!-- ── CARD 1: Friction (Top Left) ── -->
  <g transform="translate(40, 40)">
    <!-- Shadow (wobbly filled box) -->
    <rect x="8" y="8" width="630" height="480" rx="14" fill="#FCEAE6" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="630" height="480" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="24" y="24" width="135" height="42" rx="10" fill="rgba(224, 90, 71, 0.05)" stroke="#E05A47" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="91.5" y="53" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#E05A47" text-anchor="middle">Fricti0n</text>
    <!-- Slash through the zero -->
    <line x1="108" y1="52" x2="116" y2="35" stroke="#E05A47" stroke-width="2.5" stroke-linecap="round" filter="url(#gentle-rough)" />
    
    <!-- Icon: Warning/Exclamation -->
    <path d="M 580,26 L 604,64 L 556,64 Z" fill="rgba(224, 90, 71, 0.05)" stroke="#E05A47" stroke-width="2" stroke-linejoin="round" filter="url(#gentle-rough)" />
    <line x1="580" y1="36" x2="580" y2="49" stroke="#E05A47" stroke-width="2.5" stroke-linecap="round" filter="url(#gentle-rough)" />
    <circle cx="580" cy="57" r="1.5" fill="#E05A47" />

    <!-- Title -->
    <text x="24" y="98" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="22" font-weight="bold" fill="#E05A47">The Market &quot;Pull&quot;</text>
    
    <!-- Underline -->
    <line x1="24" y1="114" x2="606" y2="114" stroke="#E05A47" stroke-dasharray="0" stroke-width="1.8" filter="url(#gentle-rough)" />
    
    <!-- Content Text (spans whole box width) -->
    <text x="24" y="150" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#E05A47">What it represents:</tspan> Real, active <tspan fill="#E05A47" font-weight="bold">engineering pain points</tspan> in development.</text>
    
    <text x="24" y="190" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#E05A47">Focus:</tspan> Sourced from <tspan fill="#14B8A6" font-weight="bold">raw community</tspan> vents (<tspan fill="#6B6B76">GitHub issues, Reddit, HN comments</tspan>).</text>
    <text x="24" y="215" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">Maybe a venting about a <tspan fill="#D97706" font-weight="bold">missing driver</tspan>, a library compatibility bug, or</text>
    <text x="24" y="240" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">an undocumented limitation.</text>
    
    <text x="24" y="285" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#E05A47">Why it is included:</tspan> It provides <tspan fill="#A855F7" font-weight="bold">validation</tspan> that a genuine problem exists.</text>
    <text x="24" y="310" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">It proves that there is a <tspan fill="#E05A47" font-weight="bold">genuine problem</tspan> causing real developers headache,</text>
    <text x="24" y="335" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">ensuring you don't build something nobody actually struggles with.</text>
  </g>

  <!-- ── CARD 2: Bridge (Top Right) ── -->
  <g transform="translate(700, 40)">
    <!-- Shadow -->
    <rect x="8" y="8" width="460" height="480" rx="14" fill="#E6F7F5" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="460" height="480" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="24" y="24" width="125" height="42" rx="10" fill="rgba(20, 184, 166, 0.05)" stroke="#14B8A6" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="86.5" y="53" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#14B8A6" text-anchor="middle">Bridge</text>
    
    <!-- Icon: Connection Nodes -->
    <circle cx="398" cy="36" r="6" fill="rgba(20, 184, 166, 0.05)" stroke="#14B8A6" stroke-width="2.2" filter="url(#gentle-rough)" />
    <circle cx="422" cy="56" r="6" fill="rgba(20, 184, 166, 0.05)" stroke="#14B8A6" stroke-width="2.2" filter="url(#gentle-rough)" />
    <path d="M 402,41 L 418,51" stroke="#14B8A6" stroke-width="2.2" stroke-linecap="round" filter="url(#gentle-rough)" />

    <!-- Title -->
    <text x="24" y="98" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="22" font-weight="bold" fill="#14B8A6">The Technical Enabler</text>
    
    <!-- Underline -->
    <line x1="24" y1="114" x2="436" y2="114" stroke="#14B8A6" stroke-dasharray="0" stroke-width="1.8" filter="url(#gentle-rough)" />
    
    <!-- Content Text -->
    <text x="24" y="150" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#14B8A6">What it represents:</tspan> <tspan fill="#14B8A6" font-weight="bold">Open-source</tspan> repositories,</text>
    <text x="24" y="175" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">libraries, and integration tools.</text>
    
    <text x="24" y="220" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#14B8A6">Focus:</tspan> Obscure or emerging codebases (like compiling</text>
    <text x="24" y="245" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan fill="#14B8A6" font-weight="bold">Python definitions</tspan> to <tspan fill="#D97706" font-weight="bold">hardware layouts</tspan>, or linking</text>
    <text x="24" y="270" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan fill="#D97706" font-weight="bold">microcontroller</tspan> logic directly to a database).</text>
  </g>

  <!-- ── CARD 3: Deep Dive (Bottom Left) ── -->
  <g transform="translate(40, 550)">
    <!-- Shadow -->
    <rect x="8" y="8" width="400" height="480" rx="14" fill="#FAF0DE" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="400" height="480" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="24" y="24" width="145" height="42" rx="10" fill="rgba(217, 119, 6, 0.05)" stroke="#D97706" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="96.5" y="53" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#D97706" text-anchor="middle">Deep Dive</text>
    
    <!-- Icon: Document/Book -->
    <rect x="338" y="26" width="36" height="42" rx="4" fill="rgba(217, 119, 6, 0.05)" stroke="#D97706" stroke-width="2" filter="url(#gentle-rough)" />
    <line x1="346" y1="36" x2="366" y2="36" stroke="#D97706" stroke-width="1.5" filter="url(#gentle-rough)" />
    <line x1="346" y1="45" x2="366" y2="45" stroke="#D97706" stroke-width="1.5" filter="url(#gentle-rough)" />
    <line x1="346" y1="54" x2="358" y2="54" stroke="#D97706" stroke-width="1.5" filter="url(#gentle-rough)" />

    <!-- Title -->
    <text x="24" y="98" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="22" font-weight="bold" fill="#D97706">The Academic Foundation</text>
    
    <!-- Underline -->
    <line x1="24" y1="114" x2="376" y2="114" stroke="#D97706" stroke-dasharray="0" stroke-width="1.8" filter="url(#gentle-rough)" />
    
    <!-- Content Text -->
    <text x="24" y="150" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#D97706">What it represents:</tspan> One <tspan fill="#D97706" font-weight="bold">highly technical</tspan>,</text>
    <text x="24" y="175" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">comprehensive write-up or <tspan fill="#D97706" font-weight="bold">academic article</tspan></text>
    <text x="24" y="200" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">worth reading in full.</text>
    
    <text x="24" y="245" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#D97706">Focus:</tspan> Low-noise engineering documents (e.g. a</text>
    <text x="24" y="270" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">guide on <tspan fill="#D97706" font-weight="bold">high-frequency PCB trace design</tspan>, or</text>
    <text x="24" y="295" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">an analysis of <tspan fill="#A855F7" font-weight="bold">memory allocation structures</tspan>).</text>
  </g>

  <!-- ── CARD 4: Opportunity (Bottom Right) ── -->
  <g transform="translate(470, 550)">
    <!-- Shadow -->
    <rect x="8" y="8" width="690" height="480" rx="14" fill="#F5ECFE" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="690" height="480" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="24" y="24" width="165" height="42" rx="10" fill="rgba(168, 85, 247, 0.05)" stroke="#A855F7" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="106.5" y="53" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#A855F7" text-anchor="middle">0pportunity</text>
    <!-- Slash through the zero -->
    <line x1="48" y1="52" x2="56" y2="35" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round" filter="url(#gentle-rough)" />
    
    <!-- Icon: Lightbulb/Idea -->
    <circle cx="635" cy="38" r="12" fill="rgba(168, 85, 247, 0.05)" stroke="#A855F7" stroke-width="2" filter="url(#gentle-rough)" />
    <path d="M 630,50 L 640,50 M 632,54 L 638,54" stroke="#A855F7" stroke-width="2" stroke-linecap="round" filter="url(#gentle-rough)" />
    <line x1="635" y1="17" x2="635" y2="21" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" filter="url(#gentle-rough)" />
    <line x1="614" y1="38" x2="618" y2="38" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" filter="url(#gentle-rough)" />
    <line x1="652" y1="38" x2="656" y2="38" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" filter="url(#gentle-rough)" />
    <line x1="620" y1="24" x2="623" y2="27" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" filter="url(#gentle-rough)" />
    <line x1="650" y1="24" x2="647" y2="27" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" filter="url(#gentle-rough)" />

    <!-- Title -->
    <text x="24" y="98" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="22" font-weight="bold" fill="#A855F7">The Actionable Product</text>
    
    <!-- Underline -->
    <line x1="24" y1="114" x2="666" y2="114" stroke="#A855F7" stroke-dasharray="0" stroke-width="1.8" filter="url(#gentle-rough)" />
    
    <!-- Content Text -->
    <text x="24" y="150" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#A855F7">What it represents:</tspan> A specific, <tspan fill="#A855F7" font-weight="bold">scoped project gap</tspan> with a suggested implementation path.</text>
    
    <text x="24" y="195" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#A855F7">Focus:</tspan> Synthesized ideas mapping out the <tspan fill="#D97706" font-weight="bold">estimated effort (&quot;2 weeks&quot;)</tspan>, the proposed</text>
    <text x="24" y="220" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">technical approach, and <tspan fill="#E05A47" font-weight="bold">evidence of the gap</tspan> with any existing prior art.</text>
    
    <text x="24" y="265" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C"><tspan font-weight="bold" fill="#A855F7">Why it is included:</tspan> It is the output. Instead of a generic &quot;someone should build a</text>
    <text x="24" y="290" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">better database,&quot; it describes a targeted, high-signal <tspan fill="#A855F7" font-weight="bold">project blueprint</tspan> that</text>
    <text x="24" y="315" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="16" fill="#18181C">you can start building immediately.</text>
  </g>
</svg>
