<svg width="1000" height="500" viewBox="0 0 1000 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gentle-rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <pattern id="dot-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#E5E0D8" />
    </pattern>
  </defs>

  <rect width="1000" height="500" rx="16" fill="#FEF9F0" />
  <rect width="1000" height="500" fill="url(#dot-pattern)" />

  <text x="60" y="60" font-family="Consolas, 'Fira Code', monospace" font-size="28" font-weight="bold" fill="#18181C">Bring Your 0wn Key Architecture (Tentative)</text>
  <text x="60" y="85" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="14" fill="#6B6B76">$0 SERVER COSTS. KEYS SECURED IN LOCAL DB.</text>

  <!-- Card 1: User Client -->
  <g transform="translate(60, 150)">
    <rect x="8" y="8" width="240" height="250" rx="14" fill="#E6F7F5" filter="url(#gentle-rough)" />
    <rect x="0" y="0" width="240" height="250" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <rect x="20" y="20" width="120" height="36" rx="8" fill="rgba(20, 184, 166, 0.05)" stroke="#14B8A6" stroke-width="2" filter="url(#gentle-rough)" />
    <text x="80" y="44" font-family="Consolas, 'Fira Code', monospace" font-size="16" font-weight="bold" fill="#14B8A6" text-anchor="middle">Client SPA</text>
    
    <text x="20" y="90" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" font-weight="bold" fill="#18181C">Settings Page</text>
    <line x1="20" y1="105" x2="220" y2="105" stroke="#14B8A6" stroke-width="1.5" filter="url(#gentle-rough)" />
    
    <rect x="20" y="130" width="200" height="80" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="120" y="160" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#4B4B54" text-anchor="middle">User inputs personal</text>
    <text x="120" y="180" font-family="Consolas, 'Fira Code', monospace" font-size="16" font-weight="bold" fill="#A855F7" text-anchor="middle">G00gle API Key</text>
  </g>

  <!-- Card 2: FastAPI -->
  <g transform="translate(380, 150)">
    <rect x="8" y="8" width="240" height="250" rx="14" fill="#FCEAE6" filter="url(#gentle-rough)" />
    <rect x="0" y="0" width="240" height="250" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <rect x="20" y="20" width="120" height="36" rx="8" fill="rgba(224, 90, 71, 0.05)" stroke="#E05A47" stroke-width="2" filter="url(#gentle-rough)" />
    <text x="80" y="44" font-family="Consolas, 'Fira Code', monospace" font-size="16" font-weight="bold" fill="#E05A47" text-anchor="middle">FastAPI DB</text>
    
    <text x="20" y="90" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" font-weight="bold" fill="#18181C">Local Storage</text>
    <line x1="20" y1="105" x2="220" y2="105" stroke="#E05A47" stroke-width="1.5" filter="url(#gentle-rough)" />
    
    <rect x="20" y="130" width="200" height="80" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="120" y="155" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#4B4B54" text-anchor="middle">Key encrypted via</text>
    <text x="120" y="175" font-family="Consolas, 'Fira Code', monospace" font-size="14" font-weight="bold" fill="#E05A47" text-anchor="middle">bcrypt / AES</text>
    <text x="120" y="195" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#4B4B54" text-anchor="middle">in sqlite session</text>
  </g>

  <!-- Card 3: Gemini API -->
  <g transform="translate(700, 150)">
    <rect x="8" y="8" width="240" height="250" rx="14" fill="#F5ECFE" filter="url(#gentle-rough)" />
    <rect x="0" y="0" width="240" height="250" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <rect x="20" y="20" width="120" height="36" rx="8" fill="rgba(168, 85, 247, 0.05)" stroke="#A855F7" stroke-width="2" filter="url(#gentle-rough)" />
    <text x="80" y="44" font-family="Consolas, 'Fira Code', monospace" font-size="16" font-weight="bold" fill="#A855F7" text-anchor="middle">G00gle API</text>
    
    <text x="20" y="90" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" font-weight="bold" fill="#18181C">Gemini Inference</text>
    <line x1="20" y1="105" x2="220" y2="105" stroke="#A855F7" stroke-width="1.5" filter="url(#gentle-rough)" />
    
    <rect x="20" y="130" width="200" height="80" rx="6" fill="#FEF9F0" stroke="#CCCCCC" stroke-width="1.5" filter="url(#gentle-rough)" />
    <text x="120" y="160" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#4B4B54" text-anchor="middle">HTTPX Outbound Call</text>
    <text x="120" y="185" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" font-weight="bold" fill="#A855F7" text-anchor="middle">Uses User's Quota</text>
  </g>

  <!-- Arrows -->
  <path d="M 310 270 L 370 270" stroke="#18181C" stroke-width="2" stroke-dasharray="4 4" filter="url(#gentle-rough)" />
  <polygon points="375,270 365,265 365,275" fill="#18181C" filter="url(#gentle-rough)"/>
  <text x="340" y="260" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#6B6B76" text-anchor="middle">Submit</text>

  <path d="M 630 270 L 690 270" stroke="#18181C" stroke-width="2" filter="url(#gentle-rough)" />
  <polygon points="695,270 685,265 685,275" fill="#18181C" filter="url(#gentle-rough)"/>
  <text x="660" y="260" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="14" fill="#E05A47" text-anchor="middle">Inject</text>
</svg>
