<svg width="1200" height="1050" viewBox="0 0 1200 1050" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gentle wobbly filter for paths/shapes only -->
    <filter id="gentle-rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <pattern id="dot-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#E5E0D8" />
    </pattern>
  </defs>

  <!-- Warm light canvas background -->
  <rect width="1200" height="1050" rx="16" fill="#FEF9F0" />
  <rect width="1200" height="1050" fill="url(#dot-pattern)" />

  <!-- ── CARD 1: Fricti0n (Left Column) ── -->
  <g transform="translate(60, 60)">
    <!-- Shadow -->
    <rect x="8" y="8" width="520" height="530" rx="14" fill="#FCEAE6" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="520" height="530" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="30" y="30" width="135" height="42" rx="10" fill="rgba(224, 90, 71, 0.05)" stroke="#E05A47" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="97.5" y="57" font-family="Consolas, 'Fira Code', monospace" font-size="20" font-weight="bold" fill="#E05A47" text-anchor="middle">Fricti0n</text>
    
    <!-- Icon -->
    <path d="M 460,30 L 484,68 L 436,68 Z" fill="rgba(224, 90, 71, 0.05)" stroke="#E05A47" stroke-width="2" stroke-linejoin="round" filter="url(#gentle-rough)" />
    <line x1="460" y1="40" x2="460" y2="53" stroke="#E05A47" stroke-width="2.5" stroke-linecap="round" filter="url(#gentle-rough)" />
    <circle cx="460" cy="61" r="2" fill="#E05A47" />

    <!-- Title -->
    <text x="30" y="105" font-family="Consolas, 'Fira Code', monospace" font-size="24" font-weight="bold" fill="#E05A47">The Market "Pull"</text>
    <line x1="30" y1="120" x2="490" y2="120" stroke="#E05A47" stroke-width="1.8" filter="url(#gentle-rough)" />

    <!-- Text -->
    <text x="30" y="160" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#E05A47">What it represents:</tspan> Real, active</text>
    <text x="30" y="185" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan fill="#E05A47" font-weight="bold">engineering pain points</tspan> in development.</text>

    <text x="30" y="240" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#E05A47">Focus:</tspan> Sourced from <tspan fill="#14B8A6" font-weight="bold">raw community vents</tspan></text>
    <text x="30" y="265" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">(<tspan fill="#6B6B76">GitHub issues, Reddit, HN comments</tspan>). Maybe</text>
    <text x="30" y="290" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">a venting about a <tspan fill="#D97706" font-weight="bold">missing driver</tspan>, a library</text>
    <text x="30" y="315" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan fill="#E05A47" font-weight="bold">compatibility bug</tspan>, or an undocumented</text>
    <text x="30" y="340" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">limitation.</text>

    <text x="30" y="395" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#E05A47">Why it is included:</tspan> It provides <tspan fill="#A855F7" font-weight="bold">validation</tspan></text>
    <text x="30" y="420" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">that a genuine problem exists. It proves that</text>
    <text x="30" y="445" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">there is a <tspan fill="#E05A47" font-weight="bold">genuine problem</tspan> causing real</text>
    <text x="30" y="470" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">developers headache, ensuring you don't</text>
    <text x="30" y="495" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">build something nobody actually struggles with.</text>
  </g>

  <!-- ── CARD 2: Bridge (Right Column) ── -->
  <g transform="translate(620, 60)">
    <!-- Shadow -->
    <rect x="8" y="8" width="520" height="370" rx="14" fill="#E6F7F5" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="520" height="370" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="30" y="30" width="110" height="42" rx="10" fill="rgba(20, 184, 166, 0.05)" stroke="#14B8A6" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="85" y="57" font-family="Consolas, 'Fira Code', monospace" font-size="20" font-weight="bold" fill="#14B8A6" text-anchor="middle">Bridge</text>
    
    <!-- Icon -->
    <circle cx="450" cy="40" r="8" fill="rgba(20, 184, 166, 0.05)" stroke="#14B8A6" stroke-width="2.2" filter="url(#gentle-rough)" />
    <circle cx="475" cy="65" r="8" fill="rgba(20, 184, 166, 0.05)" stroke="#14B8A6" stroke-width="2.2" filter="url(#gentle-rough)" />
    <path d="M 455,46 L 470,59" stroke="#14B8A6" stroke-width="2.2" stroke-linecap="round" filter="url(#gentle-rough)" />

    <!-- Title -->
    <text x="30" y="105" font-family="Consolas, 'Fira Code', monospace" font-size="24" font-weight="bold" fill="#14B8A6">The Technical Enabler</text>
    <line x1="30" y1="120" x2="490" y2="120" stroke="#14B8A6" stroke-width="1.8" filter="url(#gentle-rough)" />

    <!-- Text -->
    <text x="30" y="160" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#14B8A6">What it represents:</tspan> <tspan fill="#14B8A6" font-weight="bold">Open-source</tspan></text>
    <text x="30" y="185" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">repositories, libraries, and integration tools.</text>

    <text x="30" y="240" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#14B8A6">Focus:</tspan> Obscure or emerging codebases</text>
    <text x="30" y="265" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">(like compiling <tspan fill="#14B8A6" font-weight="bold">Python definitions</tspan> to</text>
    <text x="30" y="290" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan fill="#D97706" font-weight="bold">hardware layouts</tspan>, or linking microcontroller</text>
    <text x="30" y="315" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">logic directly to a database).</text>
  </g>

  <!-- ── CARD 3: Deep Dive (Left Column) ── -->
  <g transform="translate(60, 630)">
    <!-- Shadow -->
    <rect x="8" y="8" width="520" height="350" rx="14" fill="#FAF0DE" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="520" height="350" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="30" y="30" width="145" height="42" rx="10" fill="rgba(217, 119, 6, 0.05)" stroke="#D97706" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="102.5" y="57" font-family="Consolas, 'Fira Code', monospace" font-size="20" font-weight="bold" fill="#D97706" text-anchor="middle">Deep Dive</text>
    
    <!-- Icon -->
    <rect x="440" y="30" width="40" height="50" rx="4" fill="rgba(217, 119, 6, 0.05)" stroke="#D97706" stroke-width="2" filter="url(#gentle-rough)" />
    <line x1="450" y1="42" x2="470" y2="42" stroke="#D97706" stroke-width="2" filter="url(#gentle-rough)" />
    <line x1="450" y1="52" x2="470" y2="52" stroke="#D97706" stroke-width="2" filter="url(#gentle-rough)" />
    <line x1="450" y1="62" x2="462" y2="62" stroke="#D97706" stroke-width="2" filter="url(#gentle-rough)" />

    <!-- Title -->
    <text x="30" y="105" font-family="Consolas, 'Fira Code', monospace" font-size="24" font-weight="bold" fill="#D97706">The Academic Foundation</text>
    <line x1="30" y1="120" x2="490" y2="120" stroke="#D97706" stroke-width="1.8" filter="url(#gentle-rough)" />

    <!-- Text -->
    <text x="30" y="160" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#D97706">What it represents:</tspan> One <tspan fill="#D97706" font-weight="bold">highly technical</tspan>,</text>
    <text x="30" y="185" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">comprehensive write-up or <tspan fill="#D97706" font-weight="bold">academic article</tspan></text>
    <text x="30" y="210" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">worth reading in full.</text>

    <text x="30" y="265" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#D97706">Focus:</tspan> Low-noise engineering documents (e.g.</text>
    <text x="30" y="290" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">a guide on <tspan fill="#D97706" font-weight="bold">high-frequency PCB trace design</tspan>,</text>
    <text x="30" y="315" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">or an analysis of <tspan fill="#A855F7" font-weight="bold">memory allocation</tspan> structures).</text>
  </g>

  <!-- ── CARD 4: 0pportunity (Right Column) ── -->
  <g transform="translate(620, 470)">
    <!-- Shadow -->
    <rect x="8" y="8" width="520" height="510" rx="14" fill="#F5ECFE" filter="url(#gentle-rough)" />
    <!-- Card Box -->
    <rect x="0" y="0" width="520" height="510" rx="14" fill="#FFFFFF" stroke="#18181C" stroke-width="2.5" filter="url(#gentle-rough)" />
    
    <!-- Badge -->
    <rect x="30" y="30" width="165" height="42" rx="10" fill="rgba(168, 85, 247, 0.05)" stroke="#A855F7" stroke-width="2.2" filter="url(#gentle-rough)" />
    <text x="112.5" y="57" font-family="Consolas, 'Fira Code', monospace" font-size="20" font-weight="bold" fill="#A855F7" text-anchor="middle">0pportunity</text>
    
    <!-- Icon -->
    <circle cx="460" cy="42" r="14" fill="rgba(168, 85, 247, 0.05)" stroke="#A855F7" stroke-width="2.2" filter="url(#gentle-rough)" />
    <path d="M 453,55 L 467,55 M 456,60 L 464,60" stroke="#A855F7" stroke-width="2.2" stroke-linecap="round" filter="url(#gentle-rough)" />
    <line x1="460" y1="18" x2="460" y2="23" stroke="#A855F7" stroke-width="2" stroke-linecap="round" filter="url(#gentle-rough)" />
    <line x1="434" y1="42" x2="439" y2="42" stroke="#A855F7" stroke-width="2" stroke-linecap="round" filter="url(#gentle-rough)" />
    <line x1="481" y1="42" x2="486" y2="42" stroke="#A855F7" stroke-width="2" stroke-linecap="round" filter="url(#gentle-rough)" />

    <!-- Title -->
    <text x="30" y="105" font-family="Consolas, 'Fira Code', monospace" font-size="24" font-weight="bold" fill="#A855F7">The Actionable Product</text>
    <line x1="30" y1="120" x2="490" y2="120" stroke="#A855F7" stroke-width="1.8" filter="url(#gentle-rough)" />

    <!-- Text -->
    <text x="30" y="160" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#A855F7">What it represents:</tspan> A specific, <tspan fill="#A855F7" font-weight="bold">scoped</tspan></text>
    <text x="30" y="185" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan fill="#A855F7" font-weight="bold">project gap</tspan> with a suggested implementation path.</text>

    <text x="30" y="240" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#A855F7">Focus:</tspan> Synthesized ideas mapping out the</text>
    <text x="30" y="265" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan fill="#D97706" font-weight="bold">estimated effort</tspan> ("2 weeks"), the proposed</text>
    <text x="30" y="290" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">technical approach, and <tspan fill="#E05A47" font-weight="bold">evidence of the gap</tspan></text>
    <text x="30" y="315" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">with any existing prior art.</text>

    <text x="30" y="370" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan font-weight="bold" fill="#A855F7">Why it is included:</tspan> It is the output. Instead</text>
    <text x="30" y="395" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">of a generic "someone should build a better</text>
    <text x="30" y="420" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">database," it describes a targeted, high-signal</text>
    <text x="30" y="445" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C"><tspan fill="#A855F7" font-weight="bold">project blueprint</tspan> that you can start</text>
    <text x="30" y="470" font-family="'Virgil', 'Comic Sans MS', cursive" font-size="18" fill="#18181C">building immediately.</text>
  </g>
</svg>
