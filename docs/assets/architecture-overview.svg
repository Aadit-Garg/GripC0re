<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Displacement filter for wobbly, hand-drawn shapes -->
    <filter id="rough-edge" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Dark sketchpad canvas -->
  <rect width="1200" height="750" rx="16" fill="#18181C" />
  
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400 M 0,450 L 1200,450 M 0,500 L 1200,500 M 0,550 L 1200,550 M 0,600 L 1200,600 M 0,650 L 1200,650 M 0,700 L 1200,700" />
    <path d="M 100,0 L 100,750 M 200,0 L 200,750 M 300,0 L 300,750 M 400,0 L 400,750 M 500,0 L 500,750 M 600,0 L 600,750 M 700,0 L 700,750 M 800,0 L 800,750 M 900,0 L 900,750 M 1000,0 L 1000,750 M 1100,0 L 1100,750" />
  </g>

  <!-- Title -->
  <text x="50" y="55" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="28" font-weight="bold" fill="#ECE6DC" filter="url(#rough-edge)">FastAPI Comprehensive Architecture Spec</text>
  <text x="50" y="85" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="14" fill="#7E7E8A" filter="url(#rough-edge)">STATISTICS-BASED SHARED GLOBAL CACHE PIPELINE FLOW</text>

  <!-- ── 1. CLIENT LAYER (Browser SPA) ── -->
  <g transform="translate(40, 140)" filter="url(#rough-edge)">
    <rect width="280" height="420" rx="10" fill="#242429" stroke="#ECE6DC" stroke-width="2.5" />
    <text x="24" y="38" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="18" font-weight="bold" fill="#ECE6DC">CLIENT WEB SPA</text>
    <text x="24" y="58" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">Vanilla JS/CSS (index.html)</text>

    <!-- State Object -->
    <rect x="20" y="90" width="240" height="60" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="112" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" font-weight="bold" fill="#ECE6DC">Global State Machine</text>
    <text x="32" y="132" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">{ token, profile, activeCards }</text>

    <!-- Hash Router -->
    <rect x="20" y="165" width="240" height="60" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="187" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" font-weight="bold" fill="#ECE6DC">Hash-Based Router</text>
    <text x="32" y="207" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">#/login • #/app • #/app/tray</text>

    <!-- Swipe Deck -->
    <rect x="20" y="240" width="240" height="60" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="262" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" font-weight="bold" fill="#ECE6DC">Swipe Discovery Deck</text>
    <text x="32" y="282" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">TouchStart / TouchEnd listeners</text>

    <!-- Kanban -->
    <rect x="20" y="315" width="240" height="60" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="337" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" font-weight="bold" fill="#ECE6DC">Kanban Tray drag/drop</text>
    <text x="32" y="357" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">HTML5 DragEvent DataTransfer</text>
  </g>

  <!-- ── 2. BACKEND LAYER (FastAPI API Gateway) ── -->
  <g transform="translate(380, 140)" filter="url(#rough-edge)">
    <rect width="380" height="540" rx="10" fill="#242429" stroke="#ECE6DC" stroke-width="2.5" />
    <text x="24" y="38" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="20" font-weight="bold" fill="#ECE6DC">FASTAPI CORE ASGI</text>
    <text x="24" y="58" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">Uvicorn Server on Port 8000</text>

    <!-- Security/CORS middleware -->
    <rect x="20" y="90" width="340" height="55" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="112" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" fill="#E05A47">Middleware / Security</text>
    <text x="32" y="130" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">CORS Origins check • Passlib Bcrypt Context</text>

    <!-- Pydantic Schemas -->
    <rect x="20" y="160" width="340" height="75" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="182" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" fill="#14B8A6">Pydantic Validation (schemas.py)</text>
    <text x="32" y="200" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">UserRegister • ProfileUpdate • TrayItemCreate</text>
    <text x="32" y="218" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">Automatic 422 error generator on mismatch</text>

    <!-- Dependency injection get_db -->
    <rect x="20" y="250" width="340" height="55" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="272" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" fill="#ECE6DC">Depends(get_db)</text>
    <text x="32" y="290" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">Generates isolated session per async request</text>

    <!-- Dependency injection get_current_user -->
    <rect x="20" y="320" width="340" height="55" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="342" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" fill="#ECE6DC">Depends(get_current_user)</text>
    <text x="32" y="360" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">Decrypts JWT (Python-Jose) • Injects User</text>

    <!-- Shared cache logic -->
    <rect x="20" y="390" width="340" height="60" rx="6" fill="#18181C" stroke="#E05A47" stroke-dasharray="6 4" stroke-width="2" />
    <text x="32" y="412" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" font-weight="bold" fill="#E05A47">Global Cache Check</text>
    <text x="32" y="432" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">Queries SQLite for cached cards matching tags</text>

    <!-- Database engine mapping -->
    <rect x="20" y="465" width="340" height="55" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="487" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="13" fill="#C2BCB2">SQLAlchemy models.py (SQLite)</text>
    <text x="32" y="505" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">users • profiles • user_votes • global_ideas</text>
  </g>

  <!-- ── 3. ASYNC PIPELINE (External Services) ── -->
  <g transform="translate(820, 180)" filter="url(#rough-edge)">
    <rect width="320" height="340" rx="10" fill="#242429" stroke="#ECE6DC" stroke-width="2.5" />
    <text x="24" y="38" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="18" font-weight="bold" fill="#ECE6DC">ASYNC PIPELINES</text>
    <text x="24" y="58" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">Activated on Cache Misses</text>

    <!-- Gemini SDK Integration -->
    <rect x="20" y="90" width="280" height="100" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="115" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="14" font-weight="bold" fill="#A855F7">Gemini SDK Service</text>
    <text x="32" y="135" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">- Calls Google API via executor</text>
    <text x="32" y="152" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">- Enforces structured JSON config</text>
    <text x="32" y="169" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">- Filters by User Bias Profiles</text>

    <!-- Async HTTPX Proxy Scraper -->
    <rect x="20" y="210" width="280" height="100" rx="6" fill="#18181C" stroke="#444" stroke-width="1.5" />
    <text x="32" y="235" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="14" font-weight="bold" fill="#D97706">Async Crawler Proxy</text>
    <text x="32" y="255" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">- HTTPX AsyncClient requests</text>
    <text x="32" y="272" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">- BS4 metadata parser (CORS bypass)</text>
    <text x="32" y="289" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A">- Resolves absolute favicon links</text>
  </g>

  <!-- ── 4. CONNECTIVE FLOW ARROWS ── -->
  
  <!-- Client to API Server Flow -->
  <path d="M 320 350 L 370 350" stroke="#ECE6DC" stroke-width="2" marker-end="url(#arrow)" filter="url(#rough-edge)" />
  <text x="330" y="335" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#7E7E8A" filter="url(#rough-edge)">API</text>

  <!-- API Server to Cache Database write -->
  <path d="M 570 680 L 570 710 L 180 710 L 180 570" stroke="#14B8A6" stroke-width="1.8" fill="none" marker-end="url(#arrow)" filter="url(#rough-edge)" />
  <text x="320" y="700" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="12" fill="#14B8A6" filter="url(#rough-edge)">Serve matching cards (Zero cost cache hit)</text>

  <!-- API Server to Pipeline miss trigger -->
  <path d="M 760 330 L 810 330" stroke="#E05A47" stroke-width="2" marker-end="url(#arrow)" filter="url(#rough-edge)" />
  <text x="765" y="315" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#E05A47" filter="url(#rough-edge)">miss</text>

  <!-- Pipeline write back to database cache -->
  <path d="M 810 380 L 760 380" stroke="#14B8A6" stroke-width="1.8" marker-end="url(#arrow)" filter="url(#rough-edge)" />
  <text x="765" y="405" font-family="'Virgil', 'Comic Sans MS', cursive, sans-serif" font-size="11" fill="#14B8A6" filter="url(#rough-edge)">cache</text>

  <!-- Arrow Marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#ECE6DC" />
    </marker>
  </defs>
</svg>
